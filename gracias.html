<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Votación enviada</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f4f7f6;
            color: #333;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .card {
            max-width: 600px;
            width: 100%;
            background: white;
            padding: 40px;
            border-radius: 14px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.06);
            text-align: center;
        }

        h1 {
            color: #4a90e2;
            margin-top: 0;
        }

        p {
            color: #555;
            font-size: 1.05rem;
        }

        a {
            display: inline-block;
            margin-top: 20px;
            text-decoration: none;
            background: #4a90e2;
            color: white;
            padding: 12px 20px;
            border-radius: 8px;
            font-weight: 600;
        }

        a:hover {
            background: #357abd;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Votación enviada</h1>
        <p>Gracias por participar. Tu formulario se ha enviado correctamente.</p>
        <a href="/index.html">Volver al formulario</a>
    </div>
</body>
</html>
